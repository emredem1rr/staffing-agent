<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personel Agent — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a28;--bg4:#24243a;--text:#e8e6f0;--text2:#9896a8;--text3:#6a6880;--accent:#7c6aef;--accent2:#a78bfa;--glow:rgba(124,106,239,.12);--green:#34d399;--green-bg:rgba(52,211,153,.1);--red:#f87171;--red-bg:rgba(248,113,113,.1);--amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);--blue:#60a5fa;--blue-bg:rgba(96,165,250,.1);--pink:#f472b6;--pink-bg:rgba(244,114,182,.1);--border:rgba(255,255,255,.06);--radius:12px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1360px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{font-size:20px;font-weight:500;letter-spacing:-.5px}
.header h1 span{color:var(--accent2)}
.header-right{display:flex;align-items:center;gap:12px}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 12px;border-radius:16px}
.status-pill.on{color:var(--green);background:var(--green-bg)}
.status-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.version{font-size:11px;color:var(--text3);background:var(--bg3);padding:4px 10px;border-radius:8px}
.tabs{display:flex;gap:3px;background:var(--bg2);padding:3px;border-radius:10px;margin-bottom:20px}
.tab{padding:7px 16px;border-radius:8px;border:none;background:0;color:var(--text3);cursor:pointer;font-family:inherit;font-size:13px;transition:.2s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--accent);color:#fff}
.sub-tabs{display:flex;gap:4px;margin-bottom:12px}
.sub-tab{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:0;color:var(--text3);cursor:pointer;font-family:inherit;font-size:12px;transition:.2s}
.sub-tab:hover{color:var(--text);border-color:rgba(255,255,255,.15)}
.sub-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:0;color:var(--text3);cursor:pointer;font-family:inherit;font-size:11px;transition:.2s}
.filter-btn:hover{color:var(--text);border-color:rgba(255,255,255,.15)}
.filter-btn.active{background:var(--glow);color:var(--accent2);border-color:var(--accent)}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .2s}
.card:hover{border-color:rgba(255,255,255,.1)}
.card-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card-value{font-size:28px;font-weight:600;letter-spacing:-1px}
.card-value.purple{color:var(--accent2)}
.card-value.green{color:var(--green)}
.card-value.amber{color:var(--amber)}
.card-value.blue{color:var(--blue)}
.card-value.red{color:var(--red)}
.section{margin-bottom:20px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:500}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:0}
tr:hover td{background:rgba(255,255,255,.015)}
.badge{display:inline-flex;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500}
.b-green{background:var(--green-bg);color:var(--green)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-purple{background:var(--glow);color:var(--accent2)}
.b-pink{background:var(--pink-bg);color:var(--pink)}
.btn{padding:8px 18px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:.2s}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:#6b5ae0}
.btn-s{background:var(--bg3);color:var(--text2)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.log-entry{display:flex;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;align-items:flex-start}
.log-entry:last-child{border-bottom:0}
.log-time{color:var(--text3);font-family:monospace;font-size:10px;white-space:nowrap;min-width:65px;margin-top:1px}
.log-role{min-width:90px;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.log-msg{color:var(--text2);line-height:1.4}
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:560px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:500;margin-bottom:16px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg .full{grid-column:1/-1}
.form-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:0;width:100%;transition:border-color .2s}
.fi:focus{border-color:var(--accent)}
textarea.fi{resize:vertical;min-height:70px}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:10px;font-size:10px;font-weight:600;margin-left:6px;padding:0 6px}
@media(max-width:900px){.grid4,.grid3{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
@media(max-width:600px){.grid4,.grid3,.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;
const API='http://localhost:8000';
const sMap={pending:{l:'Bekliyor',c:'b-amber'},analyzing:{l:'Analiz',c:'b-purple'},matching:{l:'Eşleştirme',c:'b-blue'},messaging:{l:'Mesajlaşma',c:'b-pink'},partially_filled:{l:'Kısmen dolu',c:'b-amber'},fulfilled:{l:'Tamamlandı',c:'b-green'},failed:{l:'Başarısız',c:'b-red'},cancelled:{l:'İptal',c:'b-red'},processing:{l:'İşleniyor',c:'b-blue'},invited:{l:'Davetli',c:'b-blue'},accepted:{l:'Kabul',c:'b-green'},declined:{l:'Red',c:'b-red'},quota_full:{l:'Kontenjan doldu',c:'b-amber'},available:{l:'Müsait',c:'b-green'},busy:{l:'Meşgul',c:'b-red'}};
const B=({s})=>{const m=sMap[s]||{l:s,c:'b-blue'};return <span className={`badge ${m.c}`}>{m.l}</span>};

function App(){
  const[tab,setTab]=useState('dashboard');
  const[stats,setStats]=useState(null);
  const[requests,setRequests]=useState([]);
  const[staff,setStaff]=useState([]);
  const[activity,setActivity]=useState([]);
  const[selReq,setSelReq]=useState(null);
  const[showNew,setShowNew]=useState(false);

  const fetch_=useCallback(async()=>{
    try{
      const[s,r,st,a]=await Promise.all([
        fetch(`${API}/api/dashboard`).then(r=>r.json()),
        fetch(`${API}/api/requests`).then(r=>r.json()),
        fetch(`${API}/api/staff`).then(r=>r.json()),
        fetch(`${API}/api/activity?limit=30`).then(r=>r.json()),
      ]);
      setStats(s);setRequests(r);setStaff(st);setActivity(a);
    }catch(e){console.error(e)}
  },[]);

  useEffect(()=>{fetch_();const iv=setInterval(fetch_,4000);return()=>clearInterval(iv)},[fetch_]);

  return(<div className="app">
    <header className="header">
      <h1>Personel <span>Agent</span></h1>
      <div className="header-right">
        <span className="version">Multi-Agent + WhatsApp + Email</span>
        <div className="status-pill on">Aktif</div>
      </div>
    </header>
    <div className="tabs">
      {['dashboard','requests','staff','agent-log'].map(t=>
        <button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
          {t==='dashboard'?'Genel bakış':t==='requests'?'Talepler':t==='staff'?'Personel':'Agent logu'}
        </button>)}
    </div>
    {tab==='dashboard'&&<Dashboard stats={stats} activity={activity} onReq={r=>{setSelReq(r);setTab('requests')}}/>}
    {tab==='requests'&&<Requests requests={requests} sel={selReq} setSel={setSelReq} showNew={showNew} setShowNew={setShowNew} refresh={fetch_}/>}
    {tab==='staff'&&<Staff staff={staff} refresh={fetch_}/>}
    {tab==='agent-log'&&<AgentLog activity={activity}/>}
  </div>);
}

function Dashboard({stats,activity,onReq}){
  const chartRef=useRef(null);
  const chartInst=useRef(null);
  const roleRef=useRef(null);
  const roleInst=useRef(null);

  useEffect(()=>{
    if(!stats||!chartRef.current)return;
    if(chartInst.current)chartInst.current.destroy();
    const daily=stats.daily_requests||[];
    chartInst.current=new Chart(chartRef.current,{type:'bar',data:{
      labels:daily.map(d=>d.day?.slice(5)||''),
      datasets:[{label:'Talepler',data:daily.map(d=>d.count),backgroundColor:'rgba(124,106,239,.6)',borderRadius:6,borderSkipped:false}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#6a6880',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6a6880',font:{size:10}}}}}});
  },[stats]);

  useEffect(()=>{
    if(!stats||!roleRef.current)return;
    if(roleInst.current)roleInst.current.destroy();
    const roles=stats.top_roles||[];
    roleInst.current=new Chart(roleRef.current,{type:'doughnut',data:{
      labels:roles.map(r=>r.role),
      datasets:[{data:roles.map(r=>r.count),backgroundColor:['#7c6aef','#34d399','#fbbf24','#f87171','#60a5fa'],borderWidth:0}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#9896a8',font:{size:11},padding:12}}},cutout:'65%'}});
  },[stats]);

  if(!stats)return<div className="empty">Yükleniyor...</div>;
  return(<>
    <div className="grid4">
      <div className="card"><div className="card-title">Toplam talep</div><div className="card-value purple">{stats.total_requests}</div></div>
      <div className="card"><div className="card-title">Aktif</div><div className="card-value amber">{stats.active_requests}</div></div>
      <div className="card"><div className="card-title">Tamamlanan</div><div className="card-value green">{stats.fulfilled_requests}</div></div>
      <div className="card"><div className="card-title">Personel (müsait)</div><div className="card-value blue">{stats.available_staff}/{stats.total_staff}</div></div>
    </div>
    <div className="grid2">
      <div className="chart-box"><div className="card-title" style={{marginBottom:8}}>Son 7 gün talepler</div><div style={{height:180}}><canvas ref={chartRef}/></div></div>
      <div className="chart-box"><div className="card-title" style={{marginBottom:8}}>Pozisyon dağılımı</div><div style={{height:180}}><canvas ref={roleRef}/></div></div>
    </div>
    <div className="grid2">
      <div className="section">
        <div className="section-head"><div className="section-title">Son talepler</div></div>
        <div className="tw"><table><thead><tr><th>ID</th><th>Müşteri</th><th>Durum</th></tr></thead><tbody>
          {(stats.recent_requests||[]).slice(0,6).map(r=><tr key={r.id} style={{cursor:'pointer'}} onClick={()=>onReq(r)}>
            <td>#{r.id}</td><td style={{fontWeight:500}}>{r.client_name}</td><td><B s={r.status}/></td>
          </tr>)}
          {(stats.recent_requests||[]).length===0&&<tr><td colSpan={3} className="empty">Talep yok</td></tr>}
        </tbody></table></div>
      </div>
      <div className="section">
        <div className="section-head"><div className="section-title">Canlı agent aktivitesi</div></div>
        <div className="tw" style={{maxHeight:260,overflowY:'auto'}}>
          {(activity||[]).slice(0,10).map((a,i)=>{
            const colors={coordinator:'var(--accent2)',analyzer:'var(--blue)',matcher:'var(--green)',communicator:'var(--pink)',webhook:'var(--amber)',email_checker:'var(--blue)',reminder:'var(--green)'};
            return<div key={i} className="log-entry">
              <span className="log-time">{a.timestamp?new Date(a.timestamp).toLocaleTimeString('tr-TR'):''}</span>
              <span className="log-role" style={{color:colors[a.agent_role]||'var(--text3)'}}>{a.agent_role}</span>
              <span className="log-msg">{a.detail?.slice(0,80)}</span>
            </div>})}
        </div>
      </div>
    </div>
  </>);
}

function Requests({requests,sel,setSel,showNew,setShowNew,refresh}){
  const[detail,setDetail]=useState(null);
  const[reqTab,setReqTab]=useState('active');
  useEffect(()=>{if(sel)fetch(`${API}/api/requests/${sel.id}`).then(r=>r.json()).then(setDetail);else setDetail(null)},[sel]);
  const respond=async(sid,rid,resp)=>{await fetch(`${API}/api/respond/${sid}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({request_id:rid,response:resp})});const d=await fetch(`${API}/api/requests/${rid}`).then(r=>r.json());setDetail(d);refresh()};

  if(detail)return(<div>
    <button className="btn btn-s btn-sm" onClick={()=>{setSel(null);setDetail(null)}} style={{marginBottom:12}}>← Geri</button>
    <div className="tw" style={{padding:20,marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h2 style={{fontSize:17,fontWeight:500}}>#{detail.id} — {detail.client_name}</h2>
        <B s={detail.status}/>
      </div>
      <p style={{color:'var(--text2)',background:'var(--bg3)',padding:12,borderRadius:8,fontSize:13,lineHeight:1.6,marginBottom:12}}>"{detail.original_message}"</p>
      {detail.parsed_needs&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
        {detail.parsed_needs.location&&<span className="badge b-blue">📍 {detail.parsed_needs.location}</span>}
        {detail.parsed_needs.date&&<span className="badge b-purple">📅 {detail.parsed_needs.date}</span>}
        {detail.parsed_needs.time&&<span className="badge b-amber">🕐 {detail.parsed_needs.time}{detail.parsed_needs.end_time?'-'+detail.parsed_needs.end_time:''}</span>}
        {(detail.parsed_needs.needs||[]).map((n,i)=><span key={i} className="badge b-green">👔 {n.count} {n.role}</span>)}
      </div>}
      {detail.contact_email&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>📧 {detail.contact_email}</div>}
      {detail.crew_result?.pipeline_duration&&<div style={{fontSize:12,color:'var(--text3)'}}>⏱ Pipeline: {detail.crew_result.pipeline_duration}s</div>}
    </div>
    <div className="section"><div className="section-head"><div className="section-title">Atamalar</div></div>
      <div className="tw"><table><thead><tr><th>Personel</th><th>Rol</th><th>Konum</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>
        {(detail.assignments||[]).map(a=><tr key={a.id}>
          <td style={{fontWeight:500}}>{a.staff_name}</td><td>{a.role}</td>
          <td style={{color:'var(--text2)',fontSize:12}}>{a.staff_location||'—'}</td>
          <td><B s={a.status}/></td>
          <td>{a.status==='invited'&&<div style={{display:'flex',gap:4}}>
            <button className="btn btn-sm btn-green" onClick={()=>respond(a.staff_id,detail.id,'accept')}>Kabul</button>
            <button className="btn btn-sm btn-red" onClick={()=>respond(a.staff_id,detail.id,'decline')}>Red</button>
          </div>}</td>
        </tr>)}
      </tbody></table></div>
    </div>
    {(detail.activity||[]).length>0&&<div className="section"><div className="section-head"><div className="section-title">Agent düşünce süreci</div></div>
      <div className="tw" style={{maxHeight:300,overflowY:'auto'}}>
        {detail.activity.map((a,i)=>{
          const colors={coordinator:'var(--accent2)',analyzer:'var(--blue)',matcher:'var(--green)',communicator:'var(--pink)',webhook:'var(--amber)'};
          const icons={thinking:'💭',delegate:'📋',analysis_done:'✅',matched:'✅',conflict:'⚠️',message_sent:'📱',step_complete:'✓',pipeline_start:'🚀',pipeline_complete:'🏁',response_received:'📩',assigned:'✅',declined:'❌',quota_full:'🔴',quota_closed:'🔒',fulfilled:'🎉',client_notified:'📧',warning:'⚠️',backup_invited:'🔄',cancellation:'🚫',missing_info:'⚠️',feedback_sent:'📩',location_match:'📍',no_backup:'⚠️',whatsapp_received:'📱',whatsapp_request:'📱',email_received:'📧'};
          return<div key={i} className="log-entry">
            <span className="log-time">{a.timestamp?new Date(a.timestamp).toLocaleTimeString('tr-TR'):''}</span>
            <span className="log-role" style={{color:colors[a.agent_role]||'var(--text3)'}}>{icons[a.action]||'•'} {a.agent_role}</span>
            <span className="log-msg">{a.detail}</span>
          </div>})}
      </div>
    </div>}
  </div>);

  // Aktif vs Tamamlanan ayrımı
  const completedStatuses=['fulfilled','cancelled','failed'];
  const activeReqs=requests.filter(r=>!completedStatuses.includes(r.status));
  const completedReqs=requests.filter(r=>completedStatuses.includes(r.status));
  const shown=reqTab==='active'?activeReqs:completedReqs;

  return(<>
    <div className="section-head">
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div className="section-title">Talepler</div>
        <div className="sub-tabs">
          <button className={`sub-tab ${reqTab==='active'?'active':''}`} onClick={()=>setReqTab('active')}>
            Aktif <span className="count-badge" style={{background:reqTab==='active'?'rgba(255,255,255,.2)':'var(--amber-bg)',color:reqTab==='active'?'#fff':'var(--amber)'}}>{activeReqs.length}</span>
          </button>
          <button className={`sub-tab ${reqTab==='completed'?'active':''}`} onClick={()=>setReqTab('completed')}>
            Tamamlanan <span className="count-badge" style={{background:reqTab==='completed'?'rgba(255,255,255,.2)':'var(--green-bg)',color:reqTab==='completed'?'#fff':'var(--green)'}}>{completedReqs.length}</span>
          </button>
        </div>
      </div>
      <button className="btn btn-p btn-sm" onClick={()=>setShowNew(true)}>+ Yeni talep</button>
    </div>
    <div className="tw"><table><thead><tr><th>ID</th><th>Müşteri</th><th>Durum</th><th>Tarih</th></tr></thead><tbody>
      {shown.map(r=><tr key={r.id} style={{cursor:'pointer'}} onClick={()=>setSel(r)}>
        <td>#{r.id}</td><td style={{fontWeight:500}}>{r.client_name}</td>
        <td><B s={r.status}/></td><td style={{color:'var(--text3)',fontSize:12}}>{new Date(r.created_at).toLocaleString('tr-TR')}</td>
      </tr>)}
      {shown.length===0&&<tr><td colSpan={4} className="empty">{reqTab==='active'?'Aktif talep yok':'Tamamlanan talep yok'}</td></tr>}
    </tbody></table></div>
    {showNew&&<NewReqModal close={()=>setShowNew(false)} refresh={refresh}/>}
  </>);
}

function NewReqModal({close,refresh}){
  const[f,sF]=useState({client_name:'',message:'',contact_email:'',priority:'normal'});
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  const submit=async()=>{setLoading(true);try{const r=await fetch(`${API}/api/requests`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(f)});setResult(await r.json());refresh()}catch(e){alert(e)}setLoading(false)};
  return(<div className="modal-bg" onClick={close}><div className="modal" onClick={e=>e.stopPropagation()}>
    {!result?<><h2>Yeni talep</h2><div className="fg">
      <div><div className="form-label">Müşteri adı</div><input className="fi" value={f.client_name} onChange={e=>sF({...f,client_name:e.target.value})}/></div>
      <div><div className="form-label">Email</div><input className="fi" value={f.contact_email} onChange={e=>sF({...f,contact_email:e.target.value})}/></div>
      <div className="full"><div className="form-label">Mesaj</div><textarea className="fi" rows={3} value={f.message} onChange={e=>sF({...f,message:e.target.value})} placeholder="Yarın 10:00 için 5 garson, 3 komi lazım. Konum: Hilton Bomonti."/></div>
    </div><div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
      <button className="btn btn-s" onClick={close}>İptal</button>
      <button className="btn btn-p" onClick={submit} disabled={loading||!f.client_name||!f.message}>{loading?'Agent çalışıyor...':'Gönder'}</button>
    </div></>:<><h2>Talep #{result.request_id}</h2>
      <p style={{color:'var(--green)',marginBottom:8}}>Pipeline tamamlandı ({result.agent_result?.pipeline_duration}s)</p>
      {result.agent_result?.matches&&Object.entries(result.agent_result.matches).map(([r,i])=><div key={r} style={{padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:13}}><strong>{r}</strong>: {i.needed} gerekli, {i.invited} davet</div>)}
      <button className="btn btn-p" style={{marginTop:12}} onClick={close}>Kapat</button>
    </>}
  </div></div>);
}

function Staff({staff,refresh}){
  const[showNew,setShowNew]=useState(false);
  const[roleFilter,setRoleFilter]=useState('all');

  // Tüm rolleri çıkar
  const allRoles=[...new Set(staff.flatMap(s=>s.roles||[]))].sort();

  // Filtrele
  const filtered=roleFilter==='all'?staff:staff.filter(s=>(s.roles||[]).includes(roleFilter));

  // Müsaitlik sayısı
  const availCount=staff.filter(s=>s.status==='available').length;
  const busyCount=staff.filter(s=>s.status!=='available').length;

  return(<>
    <div className="section-head">
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div className="section-title">Personel ({filtered.length})</div>
        <span style={{fontSize:12,color:'var(--green)'}}>✅ {availCount} müsait</span>
        {busyCount>0&&<span style={{fontSize:12,color:'var(--red)'}}>🔴 {busyCount} meşgul</span>}
      </div>
      <button className="btn btn-p btn-sm" onClick={()=>setShowNew(true)}>+ Yeni</button>
    </div>

    <div className="filter-row">
      <span style={{fontSize:11,color:'var(--text3)',marginRight:4}}>Filtre:</span>
      <button className={`filter-btn ${roleFilter==='all'?'active':''}`} onClick={()=>setRoleFilter('all')}>Tümü ({staff.length})</button>
      {allRoles.map(r=>{
        const cnt=staff.filter(s=>(s.roles||[]).includes(r)).length;
        return <button key={r} className={`filter-btn ${roleFilter===r?'active':''}`} onClick={()=>setRoleFilter(r)}>{r} ({cnt})</button>
      })}
    </div>

    <div className="tw"><table><thead><tr><th>Ad</th><th>Telefon</th><th>Roller</th><th>Konum</th><th>Durum</th></tr></thead><tbody>
      {filtered.map(s=><tr key={s.id}>
        <td style={{fontWeight:500}}>{s.name}</td>
        <td style={{color:'var(--text2)',fontSize:12}}>{s.phone}</td>
        <td>{(s.roles||[]).map(r=><span key={r} className="badge b-purple" style={{marginRight:3}}>{r}</span>)}</td>
        <td style={{color:'var(--text2)',fontSize:12}}>{s.location||'—'}</td>
        <td><B s={s.status}/></td>
      </tr>)}
      {filtered.length===0&&<tr><td colSpan={5} className="empty">Bu rolle eşleşen personel yok</td></tr>}
    </tbody></table></div>
    {showNew&&<NewStaffModal close={()=>setShowNew(false)} refresh={refresh}/>}
  </>);
}

function NewStaffModal({close,refresh}){
  const[f,sF]=useState({name:'',phone:'',email:'',roles:'',location:''});
  const submit=async()=>{const roles=f.roles.split(',').map(r=>r.trim().toLowerCase()).filter(Boolean);await fetch(`${API}/api/staff`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...f,roles})});refresh();close()};
  return(<div className="modal-bg" onClick={close}><div className="modal" onClick={e=>e.stopPropagation()}>
    <h2>Yeni personel</h2><div className="fg">
      <div><div className="form-label">Ad soyad</div><input className="fi" value={f.name} onChange={e=>sF({...f,name:e.target.value})}/></div>
      <div><div className="form-label">Telefon</div><input className="fi" value={f.phone} onChange={e=>sF({...f,phone:e.target.value})}/></div>
      <div><div className="form-label">Email</div><input className="fi" value={f.email} onChange={e=>sF({...f,email:e.target.value})}/></div>
      <div><div className="form-label">Konum</div><input className="fi" placeholder="Maslak, Kadıköy..." value={f.location} onChange={e=>sF({...f,location:e.target.value})}/></div>
      <div className="full"><div className="form-label">Roller (virgülle)</div><input className="fi" placeholder="garson, komi, barmen" value={f.roles} onChange={e=>sF({...f,roles:e.target.value})}/></div>
    </div><div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
      <button className="btn btn-s" onClick={close}>İptal</button>
      <button className="btn btn-p" onClick={submit} disabled={!f.name||!f.phone||!f.roles}>Kaydet</button>
    </div>
  </div></div>);
}

function AgentLog({activity}){
  const colors={coordinator:'var(--accent2)',analyzer:'var(--blue)',matcher:'var(--green)',communicator:'var(--pink)',webhook:'var(--amber)',email_checker:'var(--blue)',reminder:'var(--green)'};
  const icons={thinking:'💭',delegate:'📋',analysis_done:'✅',matched:'✅',conflict:'⚠️',message_sent:'📱',step_complete:'✓',pipeline_start:'🚀',pipeline_complete:'🏁',response_received:'📩',assigned:'✅',declined:'❌',quota_full:'🔴',quota_closed:'🔒',fulfilled:'🎉',client_notified:'📧',warning:'⚠️',backup_invited:'🔄',cancellation:'🚫',missing_info:'⚠️',feedback_sent:'📩',whatsapp_received:'📱',whatsapp_request:'📱',email_received:'📧',reminder_sent:'⏰',no_backup:'⚠️',location_match:'📍'};
  return(<div className="section">
    <div className="section-head"><div className="section-title">Canlı agent düşünce süreci</div><div className="status-pill on" style={{fontSize:11}}>Otomatik güncelleniyor</div></div>
    <div className="tw">
      {activity.map((a,i)=><div key={i} className="log-entry">
        <span className="log-time">{a.timestamp?new Date(a.timestamp).toLocaleTimeString('tr-TR'):''}</span>
        <span className="log-role" style={{color:colors[a.agent_role]||'var(--text3)'}}>{icons[a.action]||'•'} {a.agent_role}</span>
        <span className="log-msg">{a.detail}</span>
        {a.request_id&&<span style={{fontSize:10,color:'var(--text3)',marginLeft:'auto'}}>#{a.request_id}</span>}
      </div>)}
      {activity.length===0&&<div className="empty">Henüz aktivite yok</div>}
    </div>
  </div>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
